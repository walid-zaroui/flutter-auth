name: flutter_auth
description: A Flutter authentication app with Google Sign-In using Firebase and flutter_bloc.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  flutter_bloc: ^8.1.3
  google_sign_in: ^6.1.6
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Optional: Add Google icon asset
  # assets:
  #   - lib/assets/google_icon.png